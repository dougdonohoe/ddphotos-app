##
## Tour (guided walkthrough for new users)
##

msg.tour.welcome=  <HTML><b>Welcome!</b> It looks like you are new to DD Photos.<P>\
                   This is a quick tour to get you started. We'll explain the main parts of \
                   the app and run a few <tt>ddphotos</tt> commands together.<P>\
                   Would you like to take the tour?<P> \
                   If not, you can start this tour anytime from <B>Help \u2192 Rerun Tour\u2026.</B></HTML>

msg.tour.overview= <HTML>This is the <B>Config</B> tab.<P>\
                   On the <B>left</B> you edit your <B>site</B> settings. On the <B>right</B> \
                   you add and define your <B>albums</B>.<P>\
                   The key to working with DD Photos is understanding than an <B>album</B> \
                   is essentially all photos in a given folder. Organize your photos into \
                   specific folders like <tt>Patagonia Hiking</tt>, <tt>Hannah's Graduation</tt>, or \
                   <tt>Mom's Birthday</tt>. Many users put these in their <tt>Pictures</tt> folder.  Other \
                   users might use a <tt>Dropbox</tt> or <tt>Google Drive</tt> folder.<P> \
                   As you mouse-over fields, look for the help message at the bottom of this window.<P>\
                   Before you change this site, let's first run some <tt>ddphotos</tt> \
                   commands so you can see how everything fits together.</HTML>

msg.tour.photogen= <HTML>This is the <B>Photogen</B> tab, for running the <tt>photogen</tt> command.<P>\
                   It resizes your photos and creates the index files containing your site and \
                   album descriptions and settings.<P>\
                   You need to rerun it after you add photos to an existing album or change site/album settings.<P>\
                   Click <B>Next</B> to run <tt>photogen</tt>.</HTML>

msg.tour.photogen.done= <HTML><tt>photogen</tt> finished successfully.<P>\
                   The output shows the photos it resized and the index files it \
                   created. Take a look, then click <B>Next</B> to preview your site with the \
                   <tt>run</tt> command.</HTML>

msg.tour.run=      <HTML>This is the <B>Run</B> tab, for running the <tt>run</tt> command.<P>\
                   It starts a development server so you can preview your site. While it is running, \
                   you can rerun <tt>photogen</tt> and your page refreshes automatically.<P>\
                   Click <B>Next</B> to start the dev server. When you see the <tt>Local:</tt> \
                   link in the console, click it to preview your site in your browser. When you \
                   are done exploring, click the square <B>Stop</B> button to continue the tour.</HTML>

msg.tour.build=    <HTML>This is the <B>Build</B> tab, for running the <tt>build</tt> command.<P>\
                   It produces the final, production version of your site. Unlike the dev server, \
                   <tt>build</tt> does <B>not</B> pick up changes automatically so you have rerun it after \
                   having run <tt>photogen</tt>. In practice, you typically only need to run <tt>build</tt> when \
                   you are ready to publish.<P>\
                   Click <B>Next</B> to run <tt>build</tt>.</HTML>

msg.tour.build.done= <HTML><tt>build</tt> finished successfully - your production site has been \
                   generated.<P>\
                   The output shows what was built. Click <B>Next</B> to serve that site \
                   locally with the <tt>serve</tt> command.</HTML>

msg.tour.serve=    <HTML>This is the <B>Serve</B> tab, for running the <tt>serve</tt> command.<P>\
                   It serves the production site you just built. Like <tt>build</tt>, it does \
                   <B>not</B> auto-refresh - rerun <tt>build</tt> then <tt>serve</tt> after \
                   changes.<P>\
                   The primary purpose of <tt>serve</tt> is to sanity check the site that was built \
                   works properly.<P>\
                   Click <B>Next</B> to start serving. When you see the <tt>Serving my-photos at:</tt> \
                   link in the console, click it to preview your built site in your browser. When you \
                   are done exploring, click the square <B>Stop</B> button to continue the tour.</HTML>

msg.tour.deploy=   <HTML>That's the core workflow: edit, <tt>photogen</tt>, and preview with \
                   <tt>run</tt>.  When ready to publish <tt>build</tt> and optionally <tt>serve</tt> \
                   as a sanity check.<P>\
                   DD Photos offers several publishing options. \
                   Quick and free options include exporting via the <B>Export</b> tab and then uploading to \
                   <b>Cloudflare Pages</b> via the <B>Wrangler</B> tab \
                   or to <b>Surge.sh</b> via the <B>Surge</B> tab.<P> \
                   Advanced options include \
                   deploying via <tt>rsync</tt> or S3 via the <B>Deploy</B> tab.<P>\
                   See the Help window for an overview of deployment.</HTML>

msg.tour.finish=   <HTML>You're all set! We've returned to the <B>Config</B> tab so you can make \
                   this site your own.<P>\
                   If this is a new site, start by renaming the starter <B>temporary</B> album to something meaningful and \
                   pointing its <B>source</B> at a folder of your photos.<P>\
                   If several albums share a \
                   common parent folder, define a <B>base</B> for it - a base is simply a named folder \
                   that album sources are relative to, so you don't have to repeat the full path each \
                   time.<P>\
                   From there, add more albums and adjust your site settings as you like.<P>\
                   You can replay this tour anytime from <B>Help \u2192 Rerun Tour\u2026.</B><P>\
                   Thanks for using DD Photos and good luck with your site building!</HTML>

