  Would you like to create a brand-new DD Photos site folder, \
  or do you already have one set up?</HTML>

msg.wizard.docker.binary.undefined= \
  <HTML>DD Photos could not locate the <tt>docker</tt> executable on your system.<br><br> \
  Use the <b>Docker Binary</b> field above to browse to or type the full path to your \
  <tt>docker</tt> executable (e.g. <tt>/usr/local/bin/docker</tt>).<br><br> \
  If Docker Desktop is not installed, download the installer from the \
  <a href="https://www.docker.com/get-started/">Docker Getting Started</a> page and run it.</HTML>

msg.wizard.docker.running= \
  <HTML>Docker is up and running and we know the location of the <tt>docker</tt> executable. Click <b>Next</b> to continue.</HTML>

msg.wizard.docker.notrunning= \
  <HTML>Docker Desktop is not running.<br><br> \
  If Docker Desktop is not installed, download the installer from the \
  <a href="https://www.docker.com/get-started/">Docker Getting Started</a> page and run it.<br><br> \
  If it is already installed, start it:{0}<br>Wait for DD Photos to detect Docker is running.</HTML>

msg.wizard.docker.notrunning.linux= \
  <p style="margin: 15px 0 0 24px;">Run: <tt>sudo systemctl start docker</tt>.</p>

msg.wizard.docker.notrunning.mac= \
  <p style="margin: 15px 0 0 24px;">Open <b>Docker.app</b> from your Applications folder or menu bar.</p>

msg.wizard.docker.notrunning.windows= \
  <p style="margin: 15px 0 0 24px;">Open <b>Docker Desktop</b> from the Start menu or system tray.</p>

# Bash step (Windows only)
option.wizard.bashbinary.label=   Git Bash
option.wizard.bashbinary.default=
option.wizard.bashbinary.help=    Path to <tt>bash.exe</tt> from Git for Windows. \
                                  Browse or type the full path if it is not auto-detected.

msg.wizard.bash.binary.undefined= \
  <HTML>On Windows, the <tt>ddphotos</tt> script runs under <b>Git Bash</b>, but DD Photos could \
  not locate <tt>bash.exe</tt> on your system.<br><br> \
  Use the <b>Git Bash</b> field above to browse to or type the full path to <tt>bash.exe</tt> \
  (typically <tt>C:\\Program Files\\Git\\bin\\bash.exe</tt>).<br><br> \
  If Git for Windows is not installed, download the installer from the \
  <a href="https://git-scm.com/download/win">Git for Windows</a> page and run it.<br><br>\
  <b>Note:</b> It is perfectly OK to just accept all the default options (there are a lot of screens!)</HTML>

msg.wizard.bash.found= \
