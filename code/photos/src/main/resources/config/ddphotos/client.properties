##
## Command Flags
##

label.docker.run.label=
label.docker.run.help=         <tt>run</tt> creates and runs a command inside a new Docker container.

label.docker.run.rm.label=
label.docker.run.rm.help=      <tt>--rm</tt> automatically removes the container when it exits, so stopped \
                               containers are not left behind.

label.docker.run.pull.label=
label.docker.run.pull.help=    <tt>--pull always</tt> tells Docker to fetch the newest <tt>ddphotos</tt> image \
                               every time, so you always run the latest version.

label.docker.run.always.label=
label.docker.run.always.help=  COPY=[label.docker.run.pull.help]

label.docker.run.never.label=
label.docker.run.never.help=  Used in debugging, <tt>--pull never</tt> doesn't do a pull at all.

label.docker.run.v.label=
label.docker.run.v.help=       <tt>-v</tt> mounts a folder from your computer into the container so the installed \
                               <tt>ddphotos</tt> script is written back to your machine.

label.docker.run.image.label=
label.docker.run.image.help=    The DD Photos Docker image name.

label.docker.run.init.label=
label.docker.run.init.help=    <tt>init</tt> is the <tt>ddphotos</tt> command run inside the container.

label.docker.run.scriptonly.label=
label.docker.run.scriptonly.help= <tt>--script-only</tt> tells <tt>init</tt> to only install the <tt>ddphotos</tt> \
                               wrapper script, rather than creating a new site.

label.docker.run.windows.label=
label.docker.run.windows.help= <tt>--windows</tt> tells <tt>init</tt> to also install the <tt>ddphotos.cmd</tt> \
                               windows wrapper script.

label.ddphotos.init.label=
label.ddphotos.init.help=  Create a DD Photos starter site with an example <tt>config</tt> folder.

label.ddphotos.photogen.label=
label.ddphotos.photogen.help=  Resize your albums photos and generate the index files with all the descriptive \
                               information about your site.  You must run <tt>photogen</tt> anytime after editing \
                               your site <tt>Config</tt>.

label.ddphotos.run.label=
label.ddphotos.run.help=  Run the development version of your DD Photos site, for testing purposes.  You must \
                          have run <tt>photogen</tt> first.

label.ddphotos.build.label=
label.ddphotos.build.help=  Build your static DD Photos site, which can then be Deployed or Exported.  You must \
                            have run <tt>photogen</tt> first.

label.ddphotos.serve.label=
label.ddphotos.serve.help=  Serve your built site using Apache, for testing purposes.  You must \
                            have run <tt>photogen</tt> and <tt>build</tt> first.

label.ddphotos.deploy.label=
label.ddphotos.deploy.help= Deploy a DD Photos site via built-in support for <tt>rsync</tt> or Amazon S3.  You must \
                            have run <tt>photogen</tt> and <tt>build</tt> first.

label.ddphotos.export.label=
label.ddphotos.export.help= Export a DD Photos site for deployment via Cloudflare Pages or Surge (built-in), or\
                            to other static hosting options.  You must \
                            have run <tt>photogen</tt> and <tt>build</tt> first.

label.ddphotos.wrangler.label=
label.ddphotos.wrangler.help= Deploy an exported DD Photos site to Cloudflare Pages using <tt>wrangler</tt>. \
                              <b>Note:</b> the exported site must use the <tt>--cloudflare</tt> option.

label.ddphotos.wrangler.pages.label=
label.ddphotos.wrangler.pages.help=  The <tt>pages deploy</tt> command is used to deploy a site to Cloudflare.
label.ddphotos.wrangler.deploy.label=
label.ddphotos.wrangler.deploy.help=  The <tt>pages deploy</tt> command is used to deploy a site to Cloudflare.

label.ddphotos.surge.label=
label.ddphotos.surge.help= Deploy an exported DD Photos site to Surge.sh using <tt>surge</tt>. \
                           <b>Note:</b> the exported site must use the <tt>--copy</tt> option.

label.ddphotos.upgrade.label=
label.ddphotos.upgrade.help= Upgrade the <tt>ddphotos</tt> Docker image to the latest version. Checks \
                             <tt>ddphotos version --image</tt> first and only upgrades when an update \
                             is available.

label.ddphotos.dir.label=
label.ddphotos.dir.help=  The main DD Photos working folder, which typically has a <tt>config</tt>, <tt>albums</tt>, \
                          <tt>build</tt>, and optionally <tt>export</tt> folders.

label.ddphotos.configdir.label=
label.ddphotos.configdir.help=   The custom <tt>config</tt> folder, which overrides the default, <tt>[--dir FOLDER]/config</tt>.

option.ddphotos.siteenv.default=
option.ddphotos.siteenv.label=   --site-env
option.ddphotos.siteenv.help=    Use a different <tt>site.env</tt> from the default <tt>[config-folder]/site.env</tt>.

option.ddphotos.deploy.awsprofile.default=
option.ddphotos.deploy.awsprofile.label=   --aws-profile
option.ddphotos.deploy.awsprofile.help=    This causes <tt>--profile [name]</tt> to be passed to <tt>aws</tt> commands used during the deploy process.

option.ddphotos.export.cloudflare.default= false
option.ddphotos.export.cloudflare.label=   --cloudflare
option.ddphotos.export.cloudflare.help=    Export for use in a Cloudflare (<tt>wrangler</tt>) deployment.

option.ddphotos.export.copy.default= false
option.ddphotos.export.copy.label=   --copy
option.ddphotos.export.copy.help=    Copy files instead of using symlinks (necessary for static \
                                     sites that can't follow links, like Surge).

option.ddphotos.photogen.doit.default= true
option.ddphotos.photogen.doit.label=   --doit
option.ddphotos.photogen.doit.help=    Actually resize photos and generate indexes (uncheck to do a dry-run).

option.ddphotos.photogen.index.default= true
option.ddphotos.photogen.index.label=   --index
option.ddphotos.photogen.index.help=    Generate indexes.

option.ddphotos.photogen.resize.default= true
option.ddphotos.photogen.resize.label=   --resize
option.ddphotos.photogen.resize.help=    Resize photos to efficient sizes for the website.

option.ddphotos.photogen.clean.default=  true
option.ddphotos.photogen.clean.label=    --clean
option.ddphotos.photogen.clean.help=     Remove stale output files not generated in this run.

option.ddphotos.photogen.force.default=  false
option.ddphotos.photogen.force.label=    --force
option.ddphotos.photogen.force.help=     Resize photos even if the resized photo already exists (normally resizing \
                                         is skipped if it has already happened, to save time).

option.ddphotos.photogen.heroonly.default= false
option.ddphotos.photogen.heroonly.label=   --hero-only
option.ddphotos.photogen.heroonly.help=    Regenerate hero image only, skipping all resize and index processing.

option.ddphotos.export.exportsiteid.default=
option.ddphotos.export.exportsiteid.label=   --export-site-id
option.ddphotos.export.exportsiteid.help=    Export to <tt>export/[export-site-id]</tt> instead of default <tt>export/[site-id]</tt>.

option.ddphotos.wrangler.projectname.default=
option.ddphotos.wrangler.projectname.label=   --project-name
option.ddphotos.wrangler.projectname.help=    The Cloudflare project name (site will be <tt>[project-name].pages.dev</tt>).

option.ddphotos.surge.domain.default=
option.ddphotos.surge.domain.label=     --domain
option.ddphotos.surge.domain.help=      The Surge domain name (site will be <tt>[domain].surge.sh</tt>).

option.ddphotos.surge.exportdir.label=  Export folder
option.ddphotos.surge.exportdir.help=   Pick the exported site you wish to publish to Surge.  If the list is empty, run \
                                        <tt>Export</tt> first.

option.ddphotos.wrangler.exportdir.label=  Export folder
option.ddphotos.wrangler.exportdir.help=   Pick the exported site you wish to publish to Cloudflare.  If the list is empty, run \
                                           <tt>Export</tt> first.

