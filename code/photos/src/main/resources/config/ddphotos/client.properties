msg.confirm.remove.album=          <HTML>Remove album <B>{0}</B>? <i>(no photos will be deleted)</i></HTML>
msg.confirm.unsaved.changes=       <HTML>There are unsaved changes. Switch sites anyway?</HTML>
msg.confirm.unsaved.close=         <HTML>There are unsaved changes. Exit anyway?</HTML>

