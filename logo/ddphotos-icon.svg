<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 142 142"
   width="142"
   height="142"
   version="1.1"
   id="svg7"
   sodipodi:docname="ddphotos-icon.svg"
   inkscape:version="1.4.3 (0d15f750, 2025-12-25)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs7" />
  <sodipodi:namedview
     id="namedview7"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="2.9295775"
     inkscape:cx="68.951923"
     inkscape:cy="70.317308"
     inkscape:window-width="1456"
     inkscape:window-height="895"
     inkscape:window-x="0"
     inkscape:window-y="31"
     inkscape:window-maximized="0"
     inkscape:current-layer="svg7" />
  <title
     id="title1">DD Photos icon</title>
  <desc
     id="desc1">DD Photos icon — lens monogram only, for small sizes and app icons</desc>
  <!--
    Lens-only icon: circle with DD inside, no camera body, no wordmark.
    Centered at 71,71. Outer R=71 (fills viewBox), stroke inset so it shows.
    Outer barrel R=68 (leaves 3px margin)
    Inner ring R=58
    Glass R=50
    DD outer R=52, inner R=34
    arc band=18, flat bar=4px, gap=2px
  -->
  <!-- Outer barrel -->
  <circle
     cx="71"
     cy="71"
     r="68"
     fill="#1a186b"
     stroke="#6D68D8"
     stroke-width="3"
     id="circle1" />
  <!-- Inner ring -->
  <circle
     cx="71"
     cy="71"
     r="58"
     fill="none"
     stroke="#4f4ab5"
     stroke-width="1.5"
     id="circle2" />
  <!-- Glass -->
  <circle
     cx="71.399994"
     cy="71"
     r="50"
     fill="#0f0e55"
     id="circle3" />
  <!-- Aperture lines -->
  <line
     x1="71.399994"
     y1="21"
     x2="71.399994"
     y2="121"
     stroke="#4f4ab5"
     stroke-width="0.4"
     opacity="0.15"
     id="line3" />
  <line
     x1="21.400002"
     y1="71"
     x2="121.4"
     y2="71"
     stroke="#4f4ab5"
     stroke-width="0.4"
     opacity="0.15"
     id="line4" />
  <!-- Glint -->
  <circle
     cx="54.399994"
     cy="54"
     r="8"
     fill="#ffffff"
     opacity="0.06"
     id="circle4" />
  <!--
    DD: outer R=52, inner R=34
    top = 71-52 = 19, bottom = 71+52 = 123
    inner top = 71-34 = 37, inner bottom = 71+34 = 105
    flat bar = 4px each side, gap = 2px
  -->
  <!-- LEFT reversed D -->
  <path
     d="m 70.4,19 a 52,52 0 0 0 0,104 z"
     fill="#a5b4fc"
     id="path4" />
  <path
     d="m 70.4,37 a 34,34 0 0 0 0,68 z"
     fill="#0f0e55"
     id="path5" />
  <rect
     x="66.399994"
     y="19"
     width="4"
     height="104"
     fill="#a5b4fc"
     id="rect5" />
  <!-- RIGHT normal D -->
  <path
     d="m 72.4,19 a 52,52 0 0 1 0,104 z"
     fill="#c7d2fe"
     id="path6" />
  <path
     d="m 72.4,37 a 34,34 0 0 1 0,68 z"
     fill="#0f0e55"
     id="path7" />
  <rect
     x="72.399994"
     y="19"
     width="4"
     height="104"
     fill="#c7d2fe"
     id="rect7" />
</svg>
