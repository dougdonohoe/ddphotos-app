     width="88"
     height="26"
     rx="7"
     fill="#4338CA"
     id="rect2" />
  <!-- Body panel line -->
  <line
     x1="0"
     y1="50"
     x2="270"
     y2="50"
     stroke="#2E2780"
     stroke-width="1"
     opacity="0.4"
