     x1="135"
     y1="53"
     x2="135"
     y2="157"
     stroke="#4f4ab5"
     stroke-width="0.4"
     opacity="0.15"
     id="line6" />
  <line
     x1="84"
     y1="105"
     x2="186"
     y2="105"
     stroke="#4f4ab5"
     stroke-width="0.4"
     opacity="0.15"
     id="line7" />
  <!-- Lens glint -->
  <!--
    DD monogram: outer R=55, inner R=36, centered at 135,103
    top=48, bottom=158, inner top=67, inner bottom=139
