     fill="#A5B4FC"
     opacity="0.5"
     id="circle3" />
  <!--
    Lens centered in full camera body height:
    body top=22, bottom=184, center=103
    R=71: top=32 (10px gap), bottom=174 (10px gap)
  -->
  <circle
     fill="#1a186b"
     stroke="#6d68d8"
     stroke-width="3"
     id="circle4"
     r="71"
     cy="105"
     cx="135" />
  <circle
     fill="none"
     stroke="#4f4ab5"
     stroke-width="1.5"
