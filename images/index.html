<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>ddphotos screenshots</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            background: #2b2b2b;
            font-family: -apple-system, system-ui, sans-serif;
            color: #ddd;
        }
        img {
            max-width: 95vw;
            max-height: 85vh;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
        }
        button {
            font: inherit;
            padding: 0.4rem 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <img id="gif" src="screenshots.gif" alt="ddphotos screenshots">
    <button onclick="document.getElementById('gif').src = 'screenshots.gif?' + Date.now()">Replay</button>
</body>
</html>
